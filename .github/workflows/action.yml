jobs:
  redis-operator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: building
        run: |
          export CGO_ENABLED=0 GOPATH=~/go
          go mod tidy
          git diff | grep "^[+-]" || true
          for GOARCH in amd64 arm64; do
          export GOARCH=$GOARCH
          go build -trimpath -ldflags '-s -w -extldflags "-static"' -o $GOPATH/bin/manager
          mkdir -p .git/$GOARCH && cp -av $GOPATH/bin/manager .git/$GOARCH
          done
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local
          platforms: linux/amd64,linux/arm64
          provenance: false
          pull: true
          push: true
          sbom: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/redis-operator:stable
name: build
on:
  workflow_dispatch:
